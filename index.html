<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>Health Tracker</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0b1220;
  color:white;
  -webkit-tap-highlight-color: transparent;
}

/* NAV */
.nav{
  display:flex;
  position:sticky;
  top:0;
  background:#111a2e;
  z-index:10;
}

.nav button{
  flex:1;
  padding:16px;
  border:none;
  background:transparent;
  color:white;
  font-size:14px;
}

.nav button.active{
  background:#1f2a44;
}

/* TABS */
.tab{
  display:none;
  padding:14px;
}

.tab.active{
  display:block;
}

/* CARDS */
.card{
  background:rgba(255,255,255,0.08);
  border-radius:14px;
  padding:12px;
  margin:10px 0;
  backdrop-filter:blur(10px);
}

/* INPUTS */
input{
  width:100%;
  padding:14px;
  margin:6px 0;
  border-radius:12px;
  border:none;
  font-size:16px;
  background:rgba(255,255,255,0.1);
  color:white;
}

/* BUTTONS */
button.action{
  width:100%;
  padding:14px;
  margin:6px 0;
  border-radius:12px;
  border:none;
  background:#2b6fff;
  color:white;
  font-size:16px;
}

/* GRAPH */
canvas{
  width:100%;
  height:220px;
  margin-top:10px;
  background:rgba(255,255,255,0.05);
  border-radius:14px;
}
</style>
</head>

<body>

<div class="nav">
  <button class="active" onclick="tab(0)">🩸 Tracker</button>
  <button onclick="tab(1)">🍽 Meals</button>
  <button onclick="tab(2)">🔥 Calories</button>
</div>

<!-- TRACKER -->
<div class="tab active">
  <h2>Glucose Tracker</h2>

  <input id="g" type="number" step="0.1" placeholder="mmol/L">
  <button class="action" onclick="addGlucose()">Add</button>

  <div id="status"></div>
  <div id="log"></div>

  <canvas id="graph"></canvas>
</div>

<!-- MEALS -->
<div class="tab">
  <h2>Meals</h2>

  <input id="meal" placeholder="Meal name">
  <input id="carbs" type="number" placeholder="Carbs (g)">
  <button class="action" onclick="addMeal()">Add</button>

  <div id="meals"></div>
</div>

<!-- CALORIES -->
<div class="tab">
  <h2>Calories</h2>

  <input id="food" placeholder="Food">
  <input id="cal" type="number" placeholder="Calories">
  <button class="action" onclick="addCal()">Add</button>

  <div id="calLog"></div>
  <div id="totalCal"></div>
</div>

<script>

let data=[];
let meals=[];
let cal=[];

let ema=null;
let alpha=0.5;

/* TAB */
function tab(i){
  document.querySelectorAll(".tab").forEach((t,x)=>{
    t.classList.toggle("active",x===i);
  });
  document.querySelectorAll(".nav button").forEach((b,x)=>{
    b.classList.toggle("active",x===i);
  });
  draw();
}

/* GLUCOSE */
function addGlucose(){
  let v=parseFloat(document.getElementById("g").value);
  if(isNaN(v)) return;

  data.push(v);
  document.getElementById("g").value="";

  ema = ema===null ? v : alpha*v+(1-alpha)*ema;

  update();
}

/* MEALS */
function addMeal(){
  let m=document.getElementById("meal").value;
  let c=parseFloat(document.getElementById("carbs").value);
  if(!m||isNaN(c)) return;

  meals.push({m,c});
  document.getElementById("meal").value="";
  document.getElementById("carbs").value="";
  update();
}

/* CALORIES */
function addCal(){
  let f=document.getElementById("food").value;
  let c=parseFloat(document.getElementById("cal").value);
  if(!f||isNaN(c)) return;

  cal.push({f,c});
  document.getElementById("food").value="";
  document.getElementById("cal").value="";
  update();
}

/* TREND */
function trend(){
  if(!ema||data.length<2) return "Not enough data";

  let d=data[data.length-1]-ema;

  if(d>0.2) return "📈 Rising";
  if(d<-0.2) return "📉 Falling";
  return "➡ Stable";
}

/* LOBF */
function lobf(){
  let n=data.length;
  if(n<2) return [];

  let sx=0,sy=0,sxy=0,sx2=0;

  for(let i=0;i<n;i++){
    sx+=i;
    sy+=data[i];
    sxy+=i*data[i];
    sx2+=i*i;
  }

  let m=(n*sxy-sx*sy)/(n*sx2-sx*sx);
  let b=(sy-m*sx)/n;

  return data.map((_,i)=>m*i+b);
}

/* GRAPH */
function draw(){
  let c=document.getElementById("graph");
  if(!c) return;

  let ctx=c.getContext("2d");
  ctx.clearRect(0,0,c.width,c.height);

  if(data.length<2) return;

  let max=Math.max(...data);
  let min=Math.min(...data);
  let range=max-min||1;

  let x=i=>(i/(data.length-1))*c.width;
  let y=v=>c.height-((v-min)/range)*c.height;

  /* LOW ZONE */
  let lowY=y(3);
  ctx.fillStyle="rgba(255,0,0,0.08)";
  ctx.fillRect(0,lowY,c.width,c.height-lowY);

  /* RAW */
  ctx.beginPath();
  ctx.strokeStyle="cyan";

  data.forEach((v,i)=>{
    if(i===0) ctx.moveTo(x(i),y(v));
    else ctx.lineTo(x(i),y(v));
  });
  ctx.stroke();

  /* EMA */
  let e=null;
  ctx.beginPath();
  ctx.strokeStyle="lime";

  data.forEach((v,i)=>{
    e = e===null ? v : alpha*v+(1-alpha)*e;
    if(i===0) ctx.moveTo(x(i),y(e));
    else ctx.lineTo(x(i),y(e));
  });
  ctx.stroke();

  /* LOBF */
  let fit=lobf();

  ctx.beginPath();
  ctx.strokeStyle="yellow";

  fit.forEach((v,i)=>{
    if(i===0) ctx.moveTo(x(i),y(v));
    else ctx.lineTo(x(i),y(v));
  });

  ctx.stroke();
}

/* UPDATE */
function update(){

  document.getElementById("status").innerHTML=
    `<div class="card">Trend: ${trend()}</div>`;

  document.getElementById("log").innerHTML=
    data.slice().reverse().map(v=>`<div class="card">🩸 ${v}</div>`).join("");

  document.getElementById("meals").innerHTML=
    meals.map(m=>`<div class="card">🍽 ${m.m} - ${m.c}g</div>`).join("");

  let total=cal.reduce((s,x)=>s+x.c,0);

  document.getElementById("calLog").innerHTML=
    cal.map(c=>`<div class="card">🔥 ${c.f} - ${c.c}</div>`).join("");

  document.getElementById("totalCal").innerHTML=
    `<div class="card"><b>Total:</b> ${total} kcal</div>`;

  draw();
}

update();

</script>

</body>
</html>
