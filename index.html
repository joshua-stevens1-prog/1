<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Health Tracker</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0b1220;
  color:white;
}

.nav{
  display:flex;
  position:sticky;
  top:0;
  background:#111a2e;
}

.nav button{
  flex:1;
  padding:16px;
  border:none;
  background:transparent;
  color:white;
}

.nav button.active{
  background:#1f2a44;
}

.tab{display:none;padding:14px;}
.tab.active{display:block;}

.card{
  background:rgba(255,255,255,0.08);
  border-radius:14px;
  padding:12px;
  margin:10px 0;
}

input{
  width:100%;
  padding:14px;
  margin:6px 0;
  border-radius:12px;
  border:none;
  font-size:16px;
  background:rgba(255,255,255,0.1);
  color:white;
}

button.action{
  width:100%;
  padding:14px;
  margin:6px 0;
  border-radius:12px;
  border:none;
  background:#2b6fff;
  color:white;
}

canvas{
  width:100%;
  height:220px;
  background:rgba(255,255,255,0.05);
  border-radius:14px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="nav">
  <button class="active" onclick="tab(0)">🩸 Tracker</button>
  <button onclick="tab(1)">🍽 Nutrition</button>
</div>

<!-- TRACKER -->
<div class="tab active">
  <h2>Glucose Tracker</h2>

  <input id="g" type="number" step="0.1" placeholder="mmol/L">
  <button class="action" onclick="addGlucose()">Add</button>

  <div id="status"></div>
  <div id="log"></div>

  <canvas id="graph"></canvas>
</div>

<!-- NUTRITION -->
<div class="tab">
  <h2>Nutrition</h2>

  <button class="action" onclick="toggleAdd()">➕ Add New Meal</button>
  <button class="action" onclick="togglePicker()">📋 Choose Meal</button>
  <button class="action" onclick="toggleHistory()">📜 Toggle Recent</button>

  <div id="addBox" style="display:none;">
    <input id="foodName" placeholder="Meal name">
    <input id="foodCarbs" type="number" placeholder="Carbs (g)">
    <input id="foodCal" type="number" placeholder="Calories">
    <input id="foodImg" placeholder="Image URL (optional)">
    <button class="action" onclick="addNutrition()">Save Meal</button>
  </div>

  <div id="pickBox" style="display:none;"></div>

  <div id="nutritionSummary"></div>

  <div id="nutritionList" style="display:none;"></div>
</div>

<script>
// JS GOES HERE (next section)
</script>

</body>
</html>
