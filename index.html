<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Health Tracker</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0b1220;
  color:white;
}

.nav{
  display:flex;
  position:sticky;
  top:0;
  background:#111a2e;
}

.nav button{
  flex:1;
  padding:16px;
  border:none;
  background:transparent;
  color:white;
}

.nav button.active{
  background:#1f2a44;
}

.tab{display:none;padding:14px;}
.tab.active{display:block;}

.card{
  background:rgba(255,255,255,0.08);
  border-radius:14px;
  padding:12px;
  margin:10px 0;
}

input{
  width:100%;
  padding:14px;
  margin:6px 0;
  border-radius:12px;
  border:none;
  font-size:16px;
  background:rgba(255,255,255,0.1);
  color:white;
}

button.action{
  width:100%;
  padding:14px;
  margin:6px 0;
  border-radius:12px;
  border:none;
  background:#2b6fff;
  color:white;
}

canvas{
  width:100%;
  height:220px;
  background:rgba(255,255,255,0.05);
  border-radius:14px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="nav">
  <button class="active" onclick="tab(0)">🩸 Tracker</button>
  <button onclick="tab(1)">🍽 Nutrition</button>
</div>

<!-- TRACKER -->
<div class="tab active">
  <h2>Glucose Tracker</h2>

  <input id="g" type="number" step="0.1" placeholder="mmol/L">
  <button class="action" onclick="addGlucose()">Add</button>

  <div id="status"></div>
  <div id="log"></div>

  <canvas id="graph"></canvas>
</div>

<div class="tab">
  <h2>Nutrition</h2>

  <!-- TOP SUMMARY -->
  <div id="nutritionSummary"></div>

  <!-- FLOATING CORNER BUTTONS -->
  <div style="position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:10px;z-index:999;">
    
    <!-- ADD BUTTON -->
    <button onclick="toggleAdd()"
      style="width:55px;height:55px;border-radius:50%;border:none;
      background:#2b6fff;color:white;font-size:26px;">
      +
    </button>

    <!-- HISTORY BUTTON -->
    <button onclick="toggleHistory()"
      style="width:55px;height:55px;border-radius:50%;border:none;
      background:#1f2a44;color:white;font-size:16px;">
      📜
    </button>

  </div>

  <!-- ADD MEAL PANEL -->
  <div id="addBox" style="display:none;">
    <input id="foodName" placeholder="Meal name">
    <input id="foodCarbs" type="number" placeholder="Carbs (g)">
    <input id="foodCal" type="number" placeholder="Calories">
    <input id="foodImg" placeholder="Image URL (optional)">
    <button class="action" onclick="addNutrition()">Save Meal</button>
  </div>

  <!-- PICKER -->
  <div id="pickBox" style="display:none;"></div>

  <!-- HISTORY (now hidden until button press) -->
  <div id="nutritionList" style="display:none;"></div>
</div>

<script>
let data=[];
let nutrition=[];

let ema=null;
let alpha=0.5;

let showAdd=false;
let showPicker=false;
let showHistory=false;

/* TAB */
function tab(i){
  document.querySelectorAll(".tab").forEach((t,x)=>{
    t.classList.toggle("active",x===i);
  });
  document.querySelectorAll(".nav button").forEach((b,x)=>{
    b.classList.toggle("active",x===i);
  });
  draw();
  renderNutrition();
}

/* GLUCOSE */
function addGlucose(){
  let v=parseFloat(document.getElementById("g").value);
  if(isNaN(v)) return;

  data.push(v);
  ema = ema===null ? v : alpha*v+(1-alpha)*ema;

  document.getElementById("g").value="";
  update();
}

/* TREND */
function trend(){
  if(!ema || data.length<2) return "Not enough data";

  let d=data[data.length-1]-ema;

  if(d>0.2) return "📈 Rising";
  if(d<-0.2) return "📉 Falling";
  return "➡ Stable";
}

/* GRAPH (simple version) */
function draw(){
  let c=document.getElementById("graph");
  let ctx=c.getContext("2d");
  ctx.clearRect(0,0,c.width,c.height);

  if(data.length<2) return;

  let max=Math.max(...data);
  let min=Math.min(...data);
  let range=max-min||1;

  let x=i=>(i/(data.length-1))*c.width;
  let y=v=>c.height-((v-min)/range)*c.height;

  ctx.beginPath();
  ctx.strokeStyle="cyan";

  data.forEach((v,i)=>{
    if(i===0) ctx.moveTo(x(i),y(v));
    else ctx.lineTo(x(i),y(v));
  });

  ctx.stroke();
}

/* UPDATE */
function update(){
  document.getElementById("status").innerHTML=
    `<div class="card">Trend: ${trend()}</div>`;

  document.getElementById("log").innerHTML=
    data.slice().reverse().map(v=>`<div class="card">🩸 ${v}</div>`).join("");

  draw();
}

function closeAllPanels(){
  document.getElementById("addBox").style.display = "none";
  document.getElementById("nutritionList").style.display = "none";
}

function toggleAdd(){
  let box = document.getElementById("addBox");
  let isOpen = box.style.display === "block";

  closeAllPanels();
  box.style.display = isOpen ? "none" : "block";
}

function toggleHistory(){
  let box = document.getElementById("nutritionList");
  let isOpen = box.style.display === "block";

  closeAllPanels();
  box.style.display = isOpen ? "none" : "block";
}
/* ADD MEAL */
function addNutrition(){
  let name=document.getElementById("foodName").value;
  let carbs=parseFloat(document.getElementById("foodCarbs").value)||0;
  let cal=parseFloat(document.getElementById("foodCal").value)||0;
  let img=document.getElementById("foodImg").value;

  if(!name) return;

  // ONLY SAVE TEMPLATE
  meals.push({name,carbs,cal,img});

  localStorage.setItem("meals",JSON.stringify(meals));

  document.getElementById("foodName").value="";
  document.getElementById("foodCarbs").value="";
  document.getElementById("foodCal").value="";
  document.getElementById("foodImg").value="";

  renderPicker();
}

  nutrition.push({name,carbs,cal,img,time:Date.now()});

  document.getElementById("foodName").value="";
  document.getElementById("foodCarbs").value="";
  document.getElementById("foodCal").value="";
  document.getElementById("foodImg").value="";

  renderNutrition();
}

/* PICKER */
function renderPicker(){
  document.getElementById("pickBox").innerHTML=
    nutrition.map((n,i)=>`
      <div class="card" onclick="useMeal(${i})">
        <b>${n.name}</b><br>
        🍞 ${n.carbs}g | 🔥 ${n.cal}
      </div>
    `).join("");
}

function useMeal(i){
  let m=nutrition[i];
  nutrition.push(m);
  renderNutrition();
}

/* NUTRITION VIEW */
function renderNutrition(){
  let now=Date.now();
  let day=86400000;

  let recent=nutrition.filter(n=>now-n.time<day);

  let carbs=recent.reduce((s,x)=>s+x.carbs,0);
  let cal=recent.reduce((s,x)=>s+x.cal,0);

  document.getElementById("nutritionSummary").innerHTML=
    `<div class="card">
      TODAY<br>
      Carbs: ${carbs}g<br>
      Calories: ${cal}
    </div>`;

  document.getElementById("nutritionList").innerHTML=
    recent.slice().reverse().map(n=>`
      <div class="card">
        <b>${n.name}</b><br>
        🍞 ${n.carbs}g | 🔥 ${n.cal}
        ${n.img?`<img src="${n.img}" style="width:100%;border-radius:10px;margin-top:8px;">`:""}
      </div>
    `).join("");
}

/* INIT */
update();
renderNutrition();
</script>

</body>
</html>
