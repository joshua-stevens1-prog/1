<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Health Tracker</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0b1220;
  color:white;
}

.nav{
  display:flex;
  position:sticky;
  top:0;
  background:#111a2e;
}

.nav button{
  flex:1;
  padding:16px;
  border:none;
  background:transparent;
  color:white;
}

.nav button.active{
  background:#1f2a44;
}

.tab{display:none;padding:14px;}
.tab.active{display:block;}

.card{
  background:rgba(255,255,255,0.08);
  border-radius:14px;
  padding:12px;
  margin:10px 0;
}

input{
  width:100%;
  padding:14px;
  margin:6px 0;
  border-radius:12px;
  border:none;
  font-size:16px;
  background:rgba(255,255,255,0.1);
  color:white;
}

button.action{
  width:100%;
  padding:14px;
  margin:6px 0;
  border-radius:12px;
  border:none;
  background:#2b6fff;
  color:white;
}

canvas{
  width:100%;
  height:220px;
  background:rgba(255,255,255,0.05);
  border-radius:14px;
  margin-top:10px;
}

/* floating buttons */
.fab{
  position:fixed;
  right:18px;
  display:flex;
  flex-direction:column;
  gap:10px;
  bottom:18px;
  z-index:999;
}

.fab button{
  width:55px;
  height:55px;
  border-radius:50%;
  border:none;
  color:white;
}

.addBtn{background:#2b6fff;font-size:26px;}
.histBtn{background:#1f2a44;font-size:18px;}
</style>
</head>

<body>

<div class="nav">
  <button class="active" onclick="tab(0)">🩸 Tracker</button>
  <button onclick="tab(1)">🍽 Nutrition</button>
</div>

<!-- TRACKER -->
<div class="tab active">
  <h2>Glucose Tracker</h2>

  <input id="g" type="number" step="0.1" placeholder="mmol/L">
  <button class="action" onclick="addGlucose()">Add</button>

  <div id="status"></div>
  <div id="log"></div>

  <canvas id="graph"></canvas>
</div>

<!-- NUTRITION -->
<div class="tab">
  <h2>Nutrition</h2>

  <!-- floating buttons -->
  <div class="fab">
    <button class="addBtn" onclick="toggleAdd()">+</button>
    <button class="histBtn" onclick="toggleHistory()">📜</button>
  </div>

  <div id="nutritionSummary"></div>

  <!-- add meal -->
  <div id="addBox" style="display:none;">
    <input id="foodName" placeholder="Meal name">
    <input id="foodCarbs" type="number" placeholder="Carbs (g)">
    <input id="foodCal" type="number" placeholder="Calories">
    <input id="foodImg" placeholder="Image URL (optional)">
    <button class="action" onclick="addMeal()">Save Meal</button>
  </div>

  <!-- picker -->
  <div id="pickBox"></div>

  <!-- history -->
  <div id="nutritionList" style="display:none;"></div>
</div>

<script>

/* DATA */
let data = JSON.parse(localStorage.getItem("glucose") || "[]");
let meals = JSON.parse(localStorage.getItem("meals") || "[]");
let nutritionLog = JSON.parse(localStorage.getItem("nutritionLog") || "[]");

let ema = null;
let alpha = 0.5;

/* TAB */
function tab(i){
  document.querySelectorAll(".tab").forEach((t,x)=>{
    t.classList.toggle("active",x===i);
  });
  document.querySelectorAll(".nav button").forEach((b,x)=>{
    b.classList.toggle("active",x===i);
  });

  draw();
  renderNutrition();
}

/* GLUCOSE */
function addGlucose(){
  let v = parseFloat(document.getElementById("g").value);
  if(isNaN(v)) return;

  data.push(v);
  localStorage.setItem("glucose",JSON.stringify(data));

  ema = ema===null ? v : alpha*v+(1-alpha)*ema;

  document.getElementById("g").value="";
  update();
}

/* TREND */
function trend(){
  if(!ema || data.length<2) return "Not enough data";

  let d = data[data.length-1] - ema;

  if(d>0.2) return "📈 Rising";
  if(d<-0.2) return "📉 Falling";
  return "➡ Stable";
}

/* GRAPH */
function draw(){
  let c = document.getElementById("graph");
  let ctx = c.getContext("2d");
  ctx.clearRect(0,0,c.width,c.height);

  if(data.length<2) return;

  let max = Math.max(...data);
  let min = Math.min(...data);
  let range = max-min||1;

  let x = i => (i/(data.length-1))*c.width;
  let y = v => c.height - ((v-min)/range)*c.height;

  ctx.beginPath();
  ctx.strokeStyle="cyan";

  data.forEach((v,i)=>{
    if(i===0) ctx.moveTo(x(i),y(v));
    else ctx.lineTo(x(i),y(v));
  });

  ctx.stroke();
}

/* UPDATE TRACKER */
function update(){
  document.getElementById("status").innerHTML =
    `<div class="card">Trend: ${trend()}</div>`;

  document.getElementById("log").innerHTML =
    data.slice().reverse().map(v=>`<div class="card">🩸 ${v}</div>`).join("");

  draw();
}

/* NUTRITION PANEL CONTROL */
function closePanels(){
  document.getElementById("addBox").style.display="none";
  document.getElementById("nutritionList").style.display="none";
}

function toggleAdd(){
  let b=document.getElementById("addBox");
  let open=b.style.display==="block";
  closePanels();
  b.style.display=open?"none":"block";
}

function toggleHistory(){
  let b=document.getElementById("nutritionList");
  let open=b.style.display==="block";
  closePanels();
  b.style.display=open?"none":"block";
}

/* SAVE MEAL (template only) */
function addMeal(){
  let name=document.getElementById("foodName").value;
  let carbs=parseFloat(document.getElementById("foodCarbs").value)||0;
  let cal=parseFloat(document.getElementById("foodCal").value)||0;
  let img=document.getElementById("foodImg").value;

  if(!name) return;

  meals.push({name,carbs,cal,img});
  localStorage.setItem("meals",JSON.stringify(meals));

  document.getElementById("foodName").value="";
  document.getElementById("foodCarbs").value="";
  document.getElementById("foodCal").value="";
  document.getElementById("foodImg").value="";

  renderPicker();
}

/* USE MEAL (logs eaten item) */
function useMeal(i){
  let m = meals[i];

  nutritionLog.push({
    ...m,
    time: Date.now()
  });

  localStorage.setItem("nutritionLog",JSON.stringify(nutritionLog));

  renderNutrition();
}

/* PICKER */
function renderPicker(){
  document.getElementById("pickBox").innerHTML =
    meals.map((m,i)=>`
      <div class="card" onclick="useMeal(${i})">
        <b>${m.name}</b><br>
        🍞 ${m.carbs}g | 🔥 ${m.cal}
      </div>
    `).join("");
}

/* NUTRITION VIEW */
function renderNutrition(){

  let now=Date.now();
  let day=86400000;

  let recent = nutritionLog.filter(n=>now-n.time<day);

  let carbs = recent.reduce((s,x)=>s+x.carbs,0);
  let cal = recent.reduce((s,x)=>s+x.cal,0);

  document.getElementById("nutritionSummary").innerHTML=`
    <div class="card">
      TODAY<br>
      Carbs: ${carbs}g<br>
      Calories: ${cal}
    </div>
  `;

  document.getElementById("nutritionList").innerHTML =
    recent.slice().reverse().map(n=>`
      <div class="card">
        <b>${n.name}</b><br>
        🍞 ${n.carbs}g | 🔥 ${n.cal}
        ${n.img?`<img src="${n.img}" style="width:100%;border-radius:10px;margin-top:8px;">`:""}
      </div>
    `).join("");

  renderPicker();
}

/* INIT */
update();
renderNutrition();

</script>

</body>
</html>
